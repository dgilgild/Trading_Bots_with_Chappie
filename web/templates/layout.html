<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trading Bot Dashboard</title>
    <script>
        (function () {
            var key = "tb-theme";
            try {
                var savedTheme = localStorage.getItem(key);
                if (savedTheme === "dark") {
                    document.documentElement.setAttribute("data-theme", "dark");
                }
            } catch (error) {
                // Ignore storage errors and keep light theme default.
            }
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="page-bg"></div>
    <header class="app-header">
        <div class="brand">
            <div class="brand-mark">TB</div>
            <div>
                <div class="brand-title">Trading Bots</div>
                <div class="brand-subtitle">Research & backtest console</div>
            </div>
        </div>
        <div class="app-actions">
            <nav class="app-nav">
                <a class="nav-link" href="/">Run Backtest</a>
                <a class="nav-link" href="/history">History</a>
            </nav>
            <button type="button" class="theme-toggle" data-theme-toggle aria-pressed="false">
                Night mode
            </button>
        </div>
    </header>

    <main class="app-shell">
        {% block content %}{% endblock %}
    </main>

    <footer class="app-footer">
        <span>Backtests run locally. Data stored in SQLite.</span>
    </footer>

    <script>
        (function () {
            var key = "tb-theme";
            var toggle = document.querySelector("[data-theme-toggle]");
            if (!toggle) {
                return;
            }

            var setTheme = function (theme) {
                var isDark = theme === "dark";
                if (isDark) {
                    document.documentElement.setAttribute("data-theme", "dark");
                } else {
                    document.documentElement.removeAttribute("data-theme");
                }

                toggle.setAttribute("aria-pressed", String(isDark));
                toggle.textContent = isDark ? "Light mode" : "Night mode";

                try {
                    if (isDark) {
                        localStorage.setItem(key, "dark");
                    } else {
                        localStorage.removeItem(key);
                    }
                } catch (error) {
                    // Ignore storage errors and keep in-memory theme.
                }
            };

            var initialTheme = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
            setTheme(initialTheme);

            toggle.addEventListener("click", function () {
                var nextTheme = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
                setTheme(nextTheme);
            });
        })();
    </script>
</body>
</html>
