<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trading Bot Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="page-bg"></div>
    <header class="app-header">
        <div class="brand">
            <div class="brand-mark">TB</div>
            <div>
                <div class="brand-title">Trading Bots</div>
                <div class="brand-subtitle">Research & backtest console</div>
            </div>
        </div>
        <nav class="app-nav">
            <a class="nav-link" href="/">Run Backtest</a>
            <a class="nav-link" href="/history">History</a>
        </nav>
    </header>

    <main class="app-shell">
        {% block content %}{% endblock %}
    </main>

    <footer class="app-footer">
        <span>Backtests run locally. Data stored in SQLite.</span>
    </footer>
</body>
</html>
